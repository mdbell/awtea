<?xml version="1.0" encoding="UTF-8"?>
<svg width="1200" height="1100" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <style>
      .step-box { fill: #e3f2fd; stroke: #1565c0; stroke-width: 2; }
      .heavy-box { fill: #ffebee; stroke: #c62828; stroke-width: 2; }
      .light-box { fill: #f3e5f5; stroke: #6a1b9a; stroke-width: 2; }
      .dom-box { fill: #e8f5e9; stroke: #2e7d32; stroke-width: 2; }
      .text { font-family: Arial, sans-serif; font-size: 13px; fill: #000; }
      .title { font-family: Arial, sans-serif; font-size: 16px; font-weight: bold; fill: #000; }
      .arrow { stroke: #000; stroke-width: 2; fill: none; marker-end: url(#arrowhead); }
      .label { font-family: Arial, sans-serif; font-size: 12px; fill: #555; font-style: italic; }
    </style>
    <marker id="arrowhead" markerWidth="10" markerHeight="10" refX="9" refY="3" orient="auto">
      <polygon points="0 0, 10 3, 0 6" fill="#000" />
    </marker>
  </defs>
  
  <!-- Title -->
  <text x="600" y="30" class="title" text-anchor="middle" font-size="20">Rendering Lifecycle Flowchart</text>
  
  <!-- Legend -->
  <g transform="translate(50, 50)">
    <rect x="0" y="0" width="100" height="20" class="dom-box"/>
    <text x="50" y="15" class="text" text-anchor="middle" font-size="11">DOM/Browser</text>
    
    <rect x="110" y="0" width="100" height="20" class="heavy-box"/>
    <text x="160" y="15" class="text" text-anchor="middle" font-size="11">Heavyweight</text>
    
    <rect x="220" y="0" width="100" height="20" class="light-box"/>
    <text x="270" y="15" class="text" text-anchor="middle" font-size="11">Lightweight</text>
    
    <rect x="330" y="0" width="100" height="20" class="step-box"/>
    <text x="380" y="15" class="text" text-anchor="middle" font-size="11">System</text>
  </g>
  
  <!-- Left Side: Heavyweight Rendering (TFrame) -->
  <g transform="translate(50, 120)">
    <text x="200" y="0" class="title" text-anchor="middle">Heavyweight Component (TFrame)</text>
    
    <!-- Step 1: Browser Event -->
    <rect x="50" y="20" width="300" height="50" class="dom-box"/>
    <text x="200" y="40" class="text" text-anchor="middle">1. Browser Event</text>
    <text x="200" y="60" class="text" text-anchor="middle">(mouse click, key press, resize)</text>
    
    <!-- Step 2: TEventManager -->
    <rect x="50" y="90" width="300" height="50" class="step-box"/>
    <text x="200" y="110" class="text" text-anchor="middle">2. TEventManager captures DOM event</text>
    <text x="200" y="130" class="text" text-anchor="middle">→ Creates TAWTEvent</text>
    
    <line x1="200" y1="70" x2="200" y2="90" class="arrow"/>
    
    <!-- Step 3: TEventQueue -->
    <rect x="50" y="160" width="300" height="50" class="step-box"/>
    <text x="200" y="180" class="text" text-anchor="middle">3. TEventQueue dispatches event</text>
    <text x="200" y="200" class="text" text-anchor="middle">→ to TFrame</text>
    
    <line x1="200" y1="140" x2="200" y2="160" class="arrow"/>
    
    <!-- Step 4: TFrame processes -->
    <rect x="50" y="230" width="300" height="50" class="heavy-box"/>
    <text x="200" y="250" class="text" text-anchor="middle">4. TFrame.dispatchEvent(event)</text>
    <text x="200" y="270" class="text" text-anchor="middle">Process event → may call repaint()</text>
    
    <line x1="200" y1="210" x2="200" y2="230" class="arrow"/>
    
    <!-- Step 5: repaint -->
    <rect x="50" y="300" width="300" height="50" class="step-box"/>
    <text x="200" y="320" class="text" text-anchor="middle">5. repaint() posts TPaintEvent</text>
    <text x="200" y="340" class="text" text-anchor="middle">→ to TEventQueue</text>
    
    <line x1="200" y1="280" x2="200" y2="300" class="arrow"/>
    
    <!-- Step 6: TSurfacePeer paintAll -->
    <rect x="50" y="370" width="300" height="50" class="heavy-box"/>
    <text x="200" y="390" class="text" text-anchor="middle">6. TSurfacePeer.paintAll() invoked</text>
    <text x="200" y="410" class="text" text-anchor="middle">Gets TGraphics from Surface</text>
    
    <line x1="200" y1="350" x2="200" y2="370" class="arrow"/>
    
    <!-- Step 7: TFrame paint -->
    <rect x="50" y="440" width="300" height="50" class="heavy-box"/>
    <text x="200" y="460" class="text" text-anchor="middle">7. TFrame.paint(g)</text>
    <text x="200" y="480" class="text" text-anchor="middle">→ TContainer.paint(g)</text>
    
    <line x1="200" y1="420" x2="200" y2="440" class="arrow"/>
    
    <!-- Step 8: Children paint -->
    <rect x="50" y="510" width="300" height="50" class="heavy-box"/>
    <text x="200" y="530" class="text" text-anchor="middle">8. For each child component:</text>
    <text x="200" y="550" class="text" text-anchor="middle">Translate g → child.paint(g)</text>
    
    <line x1="200" y1="490" x2="200" y2="510" class="arrow"/>
    
    <!-- Step 9: Graphics commands -->
    <rect x="50" y="580" width="300" height="50" class="step-box"/>
    <text x="200" y="600" class="text" text-anchor="middle">9. Graphics commands batched</text>
    <text x="200" y="620" class="text" text-anchor="middle">→ Sent to Rasterizer</text>
    
    <line x1="200" y1="560" x2="200" y2="580" class="arrow"/>
    
    <!-- Step 10: Backend renders -->
    <rect x="50" y="650" width="300" height="60" class="step-box"/>
    <text x="200" y="670" class="text" text-anchor="middle">10. Rasterizer executes commands</text>
    <text x="200" y="690" class="text" text-anchor="middle">WebGL/WASM/Software backend</text>
    <text x="200" y="705" class="text" text-anchor="middle">draws to pixel buffer</text>
    
    <line x1="200" y1="630" x2="200" y2="650" class="arrow"/>
    
    <!-- Step 11: Display -->
    <rect x="50" y="730" width="300" height="50" class="dom-box"/>
    <text x="200" y="750" class="text" text-anchor="middle">11. Pixels appear on screen</text>
    <text x="200" y="770" class="text" text-anchor="middle">&lt;canvas&gt; element updated</text>
    
    <line x1="200" y1="710" x2="200" y2="730" class="arrow"/>
  </g>
  
  <!-- Right Side: Lightweight Rendering (TCanvas in TPanel in TFrame) -->
  <g transform="translate(650, 120)">
    <text x="225" y="0" class="title" text-anchor="middle">Lightweight Component</text>
    <text x="225" y="18" class="label" text-anchor="middle">(TCanvas inside TPanel inside TFrame)</text>
    
    <!-- Step 1: Browser Event -->
    <rect x="75" y="40" width="300" height="50" class="dom-box"/>
    <text x="225" y="60" class="text" text-anchor="middle">1. Mouse click at (x, y)</text>
    <text x="225" y="80" class="text" text-anchor="middle">on TFrame's &lt;canvas&gt;</text>
    
    <!-- Step 2: TEventManager -->
    <rect x="75" y="110" width="300" height="50" class="step-box"/>
    <text x="225" y="130" class="text" text-anchor="middle">2. TEventManager</text>
    <text x="225" y="150" class="text" text-anchor="middle">→ Creates TMouseEvent(x, y)</text>
    
    <line x1="225" y1="90" x2="225" y2="110" class="arrow"/>
    
    <!-- Step 3: TFrame dispatch -->
    <rect x="75" y="180" width="300" height="50" class="heavy-box"/>
    <text x="225" y="200" class="text" text-anchor="middle">3. TFrame.dispatchEvent(event)</text>
    <text x="225" y="220" class="text" text-anchor="middle">→ getComponentAt(x, y) finds TPanel</text>
    
    <line x1="225" y1="160" x2="225" y2="180" class="arrow"/>
    
    <!-- Step 4: TPanel dispatch -->
    <rect x="75" y="250" width="300" height="50" class="light-box"/>
    <text x="225" y="270" class="text" text-anchor="middle">4. TPanel.dispatchEvent(event)</text>
    <text x="225" y="290" class="text" text-anchor="middle">→ getComponentAt() finds TCanvas</text>
    
    <line x1="225" y1="230" x2="225" y2="250" class="arrow"/>
    
    <!-- Step 5: TCanvas receives -->
    <rect x="75" y="320" width="300" height="50" class="light-box"/>
    <text x="225" y="340" class="text" text-anchor="middle">5. TCanvas receives TMouseEvent</text>
    <text x="225" y="360" class="text" text-anchor="middle">(coords already translated) → repaint()</text>
    
    <line x1="225" y1="300" x2="225" y2="320" class="arrow"/>
    
    <!-- Step 6: Repaint bubbles -->
    <rect x="75" y="390" width="300" height="50" class="step-box"/>
    <text x="225" y="410" class="text" text-anchor="middle">6. repaint() bubbles up to TFrame</text>
    <text x="225" y="430" class="text" text-anchor="middle">→ TFrame posts TPaintEvent</text>
    
    <line x1="225" y1="370" x2="225" y2="390" class="arrow"/>
    
    <!-- Step 7: TFrame rendering -->
    <rect x="75" y="460" width="300" height="50" class="heavy-box"/>
    <text x="225" y="480" class="text" text-anchor="middle">7. TFrame rendering starts</text>
    <text x="225" y="500" class="text" text-anchor="middle">(follows heavyweight flow)</text>
    
    <line x1="225" y1="440" x2="225" y2="460" class="arrow"/>
    
    <!-- Step 8: Eventually TCanvas -->
    <rect x="75" y="530" width="300" height="50" class="light-box"/>
    <text x="225" y="550" class="text" text-anchor="middle">8. Eventually calls TCanvas.paint(g)</text>
    <text x="225" y="570" class="text" text-anchor="middle">Graphics already translated</text>
    
    <line x1="225" y1="510" x2="225" y2="530" class="arrow"/>
    
    <!-- Step 9: TCanvas draws -->
    <rect x="75" y="600" width="300" height="60" class="light-box"/>
    <text x="225" y="620" class="text" text-anchor="middle">9. TCanvas draws into parent's Surface</text>
    <text x="225" y="640" class="text" text-anchor="middle">g.fillRect(), g.drawLine(), etc.</text>
    <text x="225" y="655" class="text" text-anchor="middle">All commands go to TFrame's canvas</text>
    
    <line x1="225" y1="580" x2="225" y2="600" class="arrow"/>
    
    <!-- Step 10: Rasterizer -->
    <rect x="75" y="680" width="300" height="50" class="step-box"/>
    <text x="225" y="700" class="text" text-anchor="middle">10. Rasterizer executes all commands</text>
    <text x="225" y="720" class="text" text-anchor="middle">(including TCanvas's)</text>
    
    <line x1="225" y1="660" x2="225" y2="680" class="arrow"/>
    
    <!-- Step 11: Display -->
    <rect x="75" y="750" width="300" height="50" class="dom-box"/>
    <text x="225" y="770" class="text" text-anchor="middle">11. All components appear on screen</text>
    <text x="225" y="790" class="text" text-anchor="middle">Single &lt;canvas&gt; shows everything</text>
    
    <line x1="225" y1="730" x2="225" y2="750" class="arrow"/>
  </g>
  
  <!-- Bottom: Key differences -->
  <g transform="translate(50, 950)">
    <text x="0" y="0" class="title">Key Differences:</text>
    <text x="0" y="25" class="text" font-weight="bold">Heavyweight (TFrame):</text>
    <text x="0" y="45" class="text">• Has its own &lt;canvas&gt; DOM element</text>
    <text x="0" y="65" class="text">• Receives events directly from TEventManager</text>
    <text x="0" y="85" class="text">• Has its own Surface and peer (TFrameFloatingPeer)</text>
    
    <text x="550" y="25" class="text" font-weight="bold">Lightweight (TCanvas):</text>
    <text x="550" y="45" class="text">• No DOM element - pure Java</text>
    <text x="550" y="65" class="text">• Events dispatched through parent hierarchy</text>
    <text x="550" y="85" class="text">• Renders into parent's Surface using translated Graphics</text>
  </g>
</svg>
