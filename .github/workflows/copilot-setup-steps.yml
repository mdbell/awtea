name: "Copilot Setup Steps"

on:
  workflow_dispatch:
  push:
    paths:
      - .github/workflows/copilot-setup-steps. yml
  pull_request:
    paths:
      - .github/workflows/copilot-setup-steps.yml

jobs:
  copilot-setup-steps:
    runs-on: ubuntu-latest
    permissions:
      contents: read

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      # Java 11 setup (primary language - 89.6%)
      - name: Set up Java 11
        uses: actions/setup-java@v4
        with:
          distribution: "temurin"
          java-version: "11"
          cache: "gradle"

      # Deno for testing (mentioned in your architecture)
      - name: Set up Deno
        uses: denoland/setup-deno@v2
        with:
          deno-version: v2.1.x

      # Emscripten for WASM compilation (C code - 4%)
      - name: Set up Emscripten
        uses: mymindstorm/setup-emsdk@v14
        with:
          version: "3.1.51"
          actions-cache-folder: "emsdk-cache"

      # Install system dependencies for native compilation
      - name: Install system dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y \
            build-essential \
            cmake \
            clang

      # Generate enums (required before build)
      - name: Generate enums from schemas
        run: ./gradlew generateEnums

      # Download Gradle dependencies
      - name: Download Gradle dependencies
        run: ./gradlew dependencies --refresh-dependencies

      # Verify setup with a test build
      - name: Verify build setup
        run: ./gradlew assemble --no-daemon
