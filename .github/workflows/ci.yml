name: CI

on:
  push:
    branches: [ main, develop ]
  pull_request:
    branches: [ main, develop ]
  workflow_dispatch:

# Cancel in-progress runs for the same PR/branch
concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  build:
    name: Build and Test
    runs-on: ubuntu-latest
    
    permissions:
      contents: read
    
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
      
      - name: Set up JDK 11
        uses: actions/setup-java@v4
        with:
          distribution: 'temurin'
          java-version: '11'
          cache: 'gradle'
      
      - name: Set up Deno
        uses: denoland/setup-deno@v2
        with:
          deno-version: v2.x
      
      - name: Make gradlew executable
        run: chmod +x gradlew
      
      - name: Generate enums from schemas
        run: ./gradlew generateEnums --no-daemon
      
      - name: Build and test all modules
        run: |
          ./gradlew build \
            --no-daemon \
            --stacktrace
      
      - name: Archive build artifacts
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: build-artifacts
          path: |
            **/build/libs/*.jar
            !**/build/libs/*-plain.jar
          retention-days: 7
      
      - name: Archive test results
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: test-results
          path: |
            **/build/test-results/**/*.xml
            **/build/reports/**
          retention-days: 7
  
  # WASM build is expensive, run only on main branch
  wasm-build:
    name: Build WASM (main branch only)
    runs-on: ubuntu-latest
    if: github.ref == 'refs/heads/main'
    
    permissions:
      contents: read
    
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
      
      - name: Set up JDK 11
        uses: actions/setup-java@v4
        with:
          distribution: 'temurin'
          java-version: '11'
          cache: 'gradle'
      
      - name: Set up Emscripten
        uses: mymindstorm/setup-emsdk@v14
        with:
          version: '3.1.51'
          actions-cache-folder: 'emsdk-cache'
      
      - name: Make gradlew executable
        run: chmod +x gradlew
      
      - name: Generate enums from schemas
        run: ./gradlew generateEnums --no-daemon
      
      - name: Build WASM module
        run: ./gradlew :awtea-graphics:buildAwtRasterWasm --no-daemon
      
      - name: Archive WASM artifact
        uses: actions/upload-artifact@v4
        with:
          name: awt-raster-wasm
          path: awtea-graphics/build/wasm/awt_raster.wasm
          retention-days: 30
  
  # Separate job for Deno tests on WASM rasterizer
  deno-tests:
    name: WASM Rasterizer Tests (Deno)
    runs-on: ubuntu-latest
    
    permissions:
      contents: read
    
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
      
      - name: Set up JDK 11
        uses: actions/setup-java@v4
        with:
          distribution: 'temurin'
          java-version: '11'
          cache: 'gradle'
      
      - name: Set up Deno
        uses: denoland/setup-deno@v2
        with:
          deno-version: v2.x
      
      - name: Set up Emscripten
        uses: mymindstorm/setup-emsdk@v14
        with:
          version: '3.1.51'
          actions-cache-folder: 'emsdk-cache'
      
      - name: Make gradlew executable
        run: chmod +x gradlew
      
      - name: Generate enums from schemas
        run: ./gradlew generateEnums --no-daemon
      
      - name: Build WASM module
        run: ./gradlew :awtea-graphics:buildAwtRasterWasm --no-daemon
      
      - name: Run Deno tests
        run: ./gradlew :awtea-graphics:denoTest --no-daemon
