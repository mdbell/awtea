name: Deploy Documentation

on:
  push:
    branches: [ main ]
    paths:
      - 'docs/**'
      - 'awtea-util/**'
      - 'build.gradle.kts'
  workflow_dispatch:

# Sets permissions for GitHub Pages deployment
permissions:
  contents: read
  pages: write
  id-token: write

# Allow one concurrent deployment
concurrency:
  group: "pages"
  cancel-in-progress: true

jobs:
  generate-docs:
    name: Generate API Documentation
    runs-on: ubuntu-latest
    
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
      
      - name: Set up JDK 11
        uses: actions/setup-java@v4
        with:
          distribution: 'temurin'
          java-version: '11'
          cache: 'gradle'
      
      - name: Make gradlew executable
        run: chmod +x gradlew
      
      - name: Generate enums from schemas
        run: ./gradlew generateEnums --no-daemon
      
      - name: Generate API coverage documentation
        run: ./gradlew generateDocs --no-daemon
      
      - name: Prepare GitHub Pages content
        run: |
          mkdir -p gh-pages
          cp -r docs/* gh-pages/
          
          # Create an index.html that redirects to main documentation
          cat > gh-pages/index.html << 'EOF'
          <!DOCTYPE html>
          <html lang="en">
          <head>
              <meta charset="UTF-8">
              <meta name="viewport" content="width=device-width, initial-scale=1.0">
              <meta http-equiv="refresh" content="0; url=coverage/report.html">
              <title>awtea Documentation</title>
              <style>
                  body {
                      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, "Helvetica Neue", Arial, sans-serif;
                      display: flex;
                      justify-content: center;
                      align-items: center;
                      height: 100vh;
                      margin: 0;
                      background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
                      color: white;
                  }
                  .container {
                      text-align: center;
                      padding: 2rem;
                  }
                  h1 { margin-bottom: 1rem; }
                  a {
                      color: #fff;
                      text-decoration: none;
                      padding: 0.5rem 1rem;
                      border: 2px solid #fff;
                      border-radius: 4px;
                      display: inline-block;
                      margin: 0.5rem;
                      transition: all 0.3s;
                  }
                  a:hover {
                      background: #fff;
                      color: #667eea;
                  }
              </style>
          </head>
          <body>
              <div class="container">
                  <h1>awtea Documentation</h1>
                  <p>Redirecting to API coverage report...</p>
                  <p>If not redirected, click below:</p>
                  <a href="coverage/report.html">API Coverage Report</a>
                  <a href="CI_CD.html">CI/CD Guide</a>
                  <a href="SELF_HOSTED_RUNNER.html">Self-Hosted Runner Setup</a>
              </div>
          </body>
          </html>
          EOF
      
      - name: Upload GitHub Pages artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: gh-pages

  deploy:
    name: Deploy to GitHub Pages
    needs: generate-docs
    runs-on: ubuntu-latest
    
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    
    steps:
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
