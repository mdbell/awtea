<!DOCTYPE html>
<html lang="en">
    <head>
        <meta charset="UTF-8">
        <meta name="viewport" content="width=device-width, initial-scale=1.0">
        <title>Focus Traversal Demo - awtea</title>
        <style>
            body {
                margin: 0;
                padding: 0;
                font-family:
                    -apple-system,
                    BlinkMacSystemFont,
                    "Segoe UI",
                    Roboto,
                    "Helvetica Neue",
                    Arial,
                    sans-serif;
                background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
                min-height: 100vh;
                display: flex;
                flex-direction: column;
                align-items: center;
                justify-content: center;
            }

            .container {
                background: white;
                border-radius: 12px;
                box-shadow: 0 20px 60px rgba(0, 0, 0, 0.3);
                padding: 30px;
                max-width: 900px;
                width: 90%;
            }

            h1 {
                color: #667eea;
                margin-top: 0;
                margin-bottom: 10px;
            }

            .subtitle {
                color: #666;
                margin-bottom: 20px;
            }

            #canvas {
                border: 2px solid #ddd;
                border-radius: 8px;
                display: block;
                margin: 0 auto;
                background: white;
                cursor: default;
            }

            .info {
                margin-top: 20px;
                padding: 15px;
                background: #f8f9fa;
                border-radius: 8px;
                font-size: 14px;
                color: #495057;
            }

            .info strong {
                color: #667eea;
            }
        </style>
    </head>
    <body>
        <div class="container">
            <h1>Focus Traversal Demo</h1>
            <p class="subtitle">
                Interactive keyboard navigation demonstration
            </p>
            <canvas id="focus-canvas" width="800" height="500"></canvas>
            <div class="info">
                <p><strong>How to use:</strong></p>
                <ul>
                    <li>
                        <strong>TAB</strong> - Navigate forward through
                        focusable components
                    </li>
                    <li>
                        <strong>Shift+TAB</strong> - Navigate backward through
                        components
                    </li>
                </ul>
            </div>
        </div>
        <script type="module">
            import { main } from "./js/focus-demo.js";
            main(["focus-canvas"]);
        </script>
    </body>
</html>
